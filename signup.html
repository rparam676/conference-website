<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>StoreFront Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">StoreFront</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                    <a class="nav-link" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link active" href="signup.html">SignUp</a>
                    </li>
                </ul>
                <!-- <ul class="d-flex navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                    <a class="nav-link" href="#">Cart</a>
                    </li>
                </ul> -->
            </div>
        </div>
    </nav>

    <div class="container my-5 p-10">
        <div class="card p-4 mb-4">
            <h2 class="text-center mb-4">Sign Up</h2>

            <form id="signupForm" class="row g-3 needs-validation" novalidate>

                <div class="col-md-6">
                    <label for="firstName" class="form-label">First name <strong class="text-danger">*</strong></label>
                    <input type="text" class="form-control" id="firstName" name="firstName" placeholder="John" autocomplete="off" required>
                    <div class="text-danger" id="firstNameError"></div>
                </div>

                <div class="col-md-6">
                    <label for="lastName" class="form-label">Last name <strong class="text-danger">*</strong></label>
                    <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Doe" autocomplete="off" required>
                    <div class="text-danger" id="lastNameError"></div>
                </div>
                
                <div class="col-md-6">
                    <label for="email" class="form-label">Email <strong class="text-danger">*</strong></label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="john_doe@example.com" autocomplete="off" required>
                    <div class="text-danger" id="emailError"></div>
                </div>

                <div class="col-md-6">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="tel" class="form-control" id="phone" name="phone" placeholder="123-456-7890" autocomplete="off">
                    <div class="text-danger" id="phoneError"></div>
                </div>
                
                <div class="col-md-6">
                    <label for="street" class="form-label">Street Address <strong class="text-danger">*</strong></label>
                    <input type="text" class="form-control" id="street" name="street" autocomplete="off" required>
                    <div class="text-danger" id="streetError"></div>
                </div>

                <div class="col-md-2">
                    <label for="city" class="form-label">City <strong class="text-danger">*</strong></label>
                    <input type="text" class="form-control" id="city" name="city" autocomplete="off" required>
                    <div class="text-danger" id="cityError"></div>
                </div>

                <div class="col-md-2">
                    <label for="state" class="form-label">State <strong class="text-danger">*</strong></label>
                    <select class="form-select" id="state" name="state" required>
                    <option value="">Choose...</option>
                    <option value="PA">Pennsylvania</option>
                    <option value="NY">New York</option>
                    <option value="CA">California</option>
                    </select>
                    <div class="text-danger" id="stateError"></div>
                </div>


                <div class="col-md-2">
                    <label for="zip" class="form-label">Zip <strong class="text-danger">*</strong></label>
                    <input type="text" class="form-control" id="zip" name="zip" autocomplete="off" required>
                    <div class="text-danger" id="zipError"></div>
                </div>

                <div class="col-12">
                    <button class="btn btn-primary" type="submit">giSignUp</button>
                    <button class="btn btn-secondary" type="reset">Clear Form</button>
                </div>
            </form>
        </div>

    </div>

    <div class="container my-5 p-10 text-center">
        <h3 class="mb-3">User Data</h3>
        <div class="container my-5" id="userCard">

        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p>&copy; 2026 StoreFront | IST 256 Group Project Demo</p>
    </footer>
    

    <script src="js/validation.js"></script>
</body>

</html>
